name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Tests
        run: cargo test --all --all-features

      - name: Build release binary
        run: cargo build --release --package platynui-spy-cli

      - name: Prepare artifact
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p artifacts
          case "${{ runner.os }}" in
            Windows)
              cp target/release/platynui-spy-cli.exe "artifacts/platynui-spy-cli-${{ runner.os }}.exe"
              ;;
            *)
              cp target/release/platynui-spy-cli "artifacts/platynui-spy-cli-${{ runner.os }}"
              ;;
          esac

      - name: Upload release binary
        uses: actions/upload-artifact@v4
        with:
          name: platynui-spy-cli-${{ runner.os }}
          path: artifacts
